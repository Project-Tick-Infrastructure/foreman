name: "corebinutils: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'corebinutils' }}

    steps:
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v2
        with:
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bmake \
            libbsd-dev \
            libmd-dev \
            musl-tools

      - name: Configure
        run: |
          ./configure

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Test
        run: |
          make test
