name: "Uppfinna: RSpec (FOSS pg17)"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  rspec:
    name: "${{ matrix.job_name }}"
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2
    permissions:
      contents: read
    services:
      postgres:
        image: registry.gitlab.com/gitlab-org/gitlab-build-images:postgres-17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
      rediscluster:
        image: registry.gitlab.com/gitlab-org/gitlab-build-images:redis-cluster-7.0.11
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    strategy:
      fail-fast: false
      matrix:
        include:
          # migration
          - { job_name: "rspec migration pg17", level: migration, opts: "--tag ~zoekt --tag ~click_house", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          # background_migration
          - { job_name: "rspec background_migration pg17", level: background_migration, opts: "--tag ~zoekt --tag ~click_house", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          # unit
          # The full unit suite is split across 4 Knapsack nodes to stay under
          # the 6h runner limit; the db-variant runs below stay single-node.
          - { job_name: "rspec unit pg17 1/4", level: unit, node_total: 4, ci_node_index: 0, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec unit pg17 2/4", level: unit, node_total: 4, ci_node_index: 1, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec unit pg17 3/4", level: unit, node_total: 4, ci_node_index: 2, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec unit pg17 4/4", level: unit, node_total: 4, ci_node_index: 3, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          # integration
          # The full integration suite is split across 2 Knapsack nodes.
          - { job_name: "rspec integration pg17 1/2", level: integration, node_total: 2, ci_node_index: 0, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec integration pg17 2/2", level: integration, node_total: 2, ci_node_index: 1, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          # system
          # The full system suite exceeds the 6h runner limit on a single node,
          # so the plain and vue3 runs are split across 4 Knapsack nodes each.
          - { job_name: "rspec system pg17 1/8", level: system, node_total: 8, ci_node_index: 0, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 2/8", level: system, node_total: 8, ci_node_index: 1, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 3/8", level: system, node_total: 8, ci_node_index: 2, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 4/8", level: system, node_total: 8, ci_node_index: 3, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 5/8", level: system, node_total: 8, ci_node_index: 4, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 6/8", level: system, node_total: 8, ci_node_index: 5, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 7/8", level: system, node_total: 8, ci_node_index: 6, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
          - { job_name: "rspec system pg17 8/8", level: system, node_total: 8, ci_node_index: 7, opts: "--tag ~level:background_migration --tag ~click_house --tag ~duo_workflow_service --tag ~partition_tz", decomposed_db: "true", sec_decomposed_db: "true", ci_connection_db: "false", sec_connection_db: "false", use_redis_cluster: "true", praefect: "false", transactions: "true", vue_version: "2" }
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      GITALY_TESTING_LOG_LEVEL: debug
      RUBYOPT: "--yjit"
      BUNDLE_WITHOUT: "development"
      BUNDLE_INSTALL_FLAGS: "--jobs=$(nproc) --retry=3"
      BUNDLE_FROZEN: "true"
      RUBY_GC_MALLOC_LIMIT: "67108864"
      RUBY_GC_MALLOC_LIMIT_MAX: "134217728"
      GEO_SECONDARY_PROXY: "0"
      SUCCESSFULLY_RETRIED_TEST_EXIT_CODE: "137"
      EVENT_PROF: "sql.active_record"
      SETUP_DB: "true"
      RSPEC_FAIL_FAST_THRESHOLD: "20"
      RETRY_FAILED_TESTS_IN_NEW_PROCESS: "true"
      RSPEC_LAST_RUN_RESULTS_FILE: "rspec/rspec_last_run_results.txt"
      KNAPSACK_RSPEC_SUITE_REPORT_PATH: "knapsack/report-master.json"
      FLAKY_RSPEC_SUITE_REPORT_PATH: "rspec/flaky/report-suite.json"
      # Knapsack splits heavy levels across nodes. Variants that do not set
      # node_total/ci_node_index in the matrix default to a single node.
      # CI_NODE_INDEX is 0-based.
      CI_NODE_TOTAL: "${{ matrix.node_total || '1' }}"
      CI_NODE_INDEX: "${{ matrix.ci_node_index || '0' }}"
      # Unique per matrix node so per-node RSpec report files (which embed
      # CI_JOB_ID) do not collide when a level is split across nodes.
      CI_JOB_ID: "${{ github.run_id }}-${{ strategy.job-index }}"
      CI_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # Per-variant (matrix)
      CI_JOB_NAME: ${{ matrix.job_name }}
      DECOMPOSED_DB: ${{ matrix.decomposed_db }}
      SEC_DECOMPOSED_DB: ${{ matrix.sec_decomposed_db }}
      CI_CONNECTION_DB: ${{ matrix.ci_connection_db }}
      SEC_CONNECTION_DB: ${{ matrix.sec_connection_db }}
      USE_REDIS_CLUSTER: ${{ matrix.use_redis_cluster }}
      GITALY_PRAEFECT_WITH_DB: ${{ matrix.praefect == 'true' && '1' || '' }}
      GITALY_TRANSACTIONS_ENABLED: ${{ matrix.transactions }}
      VUE_VERSION: ${{ matrix.vue_version }}
      RSPEC_OPTS: ${{ matrix.opts }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends jq
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache jq
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y jq
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y jq
            fi
          fi

      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ matrix.job_name }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/vendor/ruby
          key: uppfinna-ruby-gems-${{ runner.os }}-${{ hashFiles(format('{0}/Gemfile.lock', env.GITLAB_DIR), format('{0}/Gemfile.checksum', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-ruby-gems-${{ runner.os }}-

      - name: Cache Gitaly / Workhorse / test fixtures
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/tmp/tests
          key: uppfinna-tmp-tests-${{ runner.os }}-${{ hashFiles(format('{0}/GITALY_SERVER_VERSION', env.GITLAB_DIR)) }}-${{ hashFiles(format('{0}/workhorse/**', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-tmp-tests-${{ runner.os }}-

      # Bootsnap's compile cache turns the ~60s cold Rails/spec boot into ~18s.
      # Share it across jobs; restore-keys let a job start from the newest
      # available cache and top it up.
      - name: Cache bootsnap
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/tmp/cache/bootsnap
          key: uppfinna-bootsnap-${{ runner.os }}-${{ hashFiles(format('{0}/Gemfile.lock', env.GITLAB_DIR)) }}-${{ github.sha }}
          restore-keys: |
            uppfinna-bootsnap-${{ runner.os }}-${{ hashFiles(format('{0}/Gemfile.lock', env.GITLAB_DIR)) }}-
            uppfinna-bootsnap-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Set up test environment
        run: scripts/setup-test-env

      - name: Build Gitaly binaries
        run: scripts/gitaly-test-build

      # Reuse the assets built once by the compile-test-assets job instead of
      # recompiling webpack in every rspec job (the heaviest step for
      # system/integration specs). Migration levels do not need assets.
      - name: Download prebuilt test assets
        if: ${{ matrix.level != 'migration' && matrix.level != 'background_migration' }}
        uses: actions/download-artifact@v4
        with:
          name: uppfinna-test-assets
          path: ${{ env.GITLAB_DIR }}

      - name: Install knapsack
        run: gem install knapsack --no-document

      - name: Spawn Gitaly
        run: scripts/gitaly-test-spawn

      - name: Run RSpec
        env:
          FOREMAN_PLAN: ${{ inputs.foreman-plan }}
          MATRIX_LEVEL: ${{ matrix.level }}
        run: |
          mkdir -p rspec knapsack rspec/flaky
          # Needed so `**` in the selected spec globs expands recursively and
          # non-matching globs expand to nothing rather than the literal string.
          shopt -s globstar nullglob
          source scripts/utils.sh
          source scripts/rspec_helpers.sh
          export RSPEC_SKIPPED_TESTS_REPORT_PATH="rspec/skipped_tests-${CI_JOB_ID}.txt"
          export RSPEC_RETRIED_TESTS_REPORT_PATH="rspec/retried_tests-${CI_JOB_ID}.txt"

          # Predictive test selection: when Foreman resolved a reliable diff it
          # emits test_selection.advisory=false plus a list of spec globs. In
          # that case run only the selected specs (sharded across this level's
          # nodes) instead of the full Knapsack suite. Any of: no plan, advisory
          # plan, empty spec list, no matching files, or a non-unit/integration
          # level falls back to the full parallelized run.
          selection_active="false"
          selected_files=""
          if [ -n "${FOREMAN_PLAN}" ] && command -v jq >/dev/null 2>&1 \
             && { [ "${MATRIX_LEVEL}" = "unit" ] || [ "${MATRIX_LEVEL}" = "integration" ]; } \
             && [ "$(printf '%s' "${FOREMAN_PLAN}" | jq -r '(.test_selection.advisory == false)' 2>/dev/null || echo false)" = "true" ]; then
            mapfile -t globs < <(printf '%s' "${FOREMAN_PLAN}" | jq -r '.test_selection.specs[]? // empty' 2>/dev/null)
            matched=()
            for g in "${globs[@]}"; do
              while IFS= read -r f; do
                [ -n "$f" ] && matched+=("$f")
              done < <(compgen -G "$g" || true)
            done
            if [ "${#matched[@]}" -gt 0 ]; then
              selection_active="true"
              # Deterministic sharding across this level's nodes by list index.
              mapfile -t sorted < <(printf '%s\n' "${matched[@]}" | sort -u)
              node_total="${CI_NODE_TOTAL:-1}"
              node_index="${CI_NODE_INDEX:-0}"
              shard=()
              for i in "${!sorted[@]}"; do
                if [ "$(( i % node_total ))" -eq "${node_index}" ]; then
                  shard+=("${sorted[$i]}")
                fi
              done
              selected_files="${shard[*]}"
              printf 'Predictive test selection active: %s selected spec files, %s on this node (%s/%s).\n' \
                "${#sorted[@]}" "${#shard[@]}" "$(( node_index + 1 ))" "${node_total}"
            else
              echo "Predictive test selection: no files matched the selected globs; running full suite."
            fi
          fi

          if [ "${selection_active}" = "true" ]; then
            if [ -n "${selected_files}" ]; then
              # shellcheck disable=SC2086
              bin/rspec --fail-fast="${RSPEC_FAIL_FAST_THRESHOLD}" ${RSPEC_OPTS} ${selected_files}
            else
              echo "Predictive test selection active but no specs for this shard; nothing to run."
            fi
          else
            rspec_parallelized_job "--fail-fast=${RSPEC_FAIL_FAST_THRESHOLD} ${RSPEC_OPTS}"
          fi

      - name: Upload RSpec artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uppfinna-rspec-report-${{ strategy.job-index }}
          path: |
            ${{ env.GITLAB_DIR }}/coverage/
            ${{ env.GITLAB_DIR }}/knapsack/
            ${{ env.GITLAB_DIR }}/rspec/
            ${{ env.GITLAB_DIR }}/tmp/capybara/
            ${{ env.GITLAB_DIR }}/log/*.log
          if-no-files-found: ignore
          retention-days: 31

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ matrix.job_name }}
          job_status:        ${{ job.status }}
