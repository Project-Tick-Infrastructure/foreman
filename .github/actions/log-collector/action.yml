name: Log Collector
description: >
  Captures logs from all subsequent steps using pre/main/post lifecycle.
  pre: install interceptor (BASH_ENV hook + per-step log files)
  main: activate streamer that flushes logs to Foreman every 5s
  post: do final flush, send remaining logs, cleanup

inputs:
  callback_url:
    description: Foreman callback base URL.
    required: false
    default: ""
  callback_token:
    description: Foreman callback bearer token.
    required: false
    default: ""
  pipeline_id:
    description: Foreman pipeline ID.
    required: false
    default: ""
  foreman_base_url:
    description: Public Foreman base URL.
    required: false
    default: https://builds.projecttick.net
  foreman_api_token:
    description: Foreman admin API token.
    required: false
    default: ""
  job_name:
    description: Display name of the current job.
    required: true

runs:
  using: node20
  pre: pre.js
  main: main.js
  post: post.js
