name: Log Collector
description: >
  Installs a background log streamer that captures stdout/stderr from all
  subsequent steps and streams them to Foreman in real-time. Call once at
  the beginning of each job. Cleanup happens automatically via a trap.

inputs:
  callback_url:
    description: Foreman callback base URL.
    required: false
    default: ""
  callback_token:
    description: Foreman callback bearer token.
    required: false
    default: ""
  pipeline_id:
    description: Foreman pipeline ID for admin-authenticated callbacks.
    required: false
    default: ""
  foreman_base_url:
    description: Public Foreman base URL.
    required: false
    default: https://builds.projecttick.net
  foreman_api_token:
    description: Foreman admin API token.
    required: false
    default: ""
  job_name:
    description: Display name of the current job.
    required: true
  flush_interval:
    description: Seconds between log flushes to Foreman.
    required: false
    default: "5"

runs:
  using: composite
  steps:
    - name: Start log streamer
      shell: bash
      env:
        FOREMAN_LOG_DIR: ${{ runner.temp }}/_foreman_logs
        CALLBACK_URL: ${{ inputs.callback_url }}
        CALLBACK_TOKEN: ${{ inputs.callback_token }}
        PIPELINE_ID: ${{ inputs.pipeline_id }}
        FOREMAN_BASE_URL: ${{ inputs.foreman_base_url }}
        FOREMAN_API_TOKEN: ${{ inputs.foreman_api_token }}
        JOB_NAME: ${{ inputs.job_name }}
        FLUSH_INTERVAL: ${{ inputs.flush_interval }}
      run: |
        set -euo pipefail

        # Skip if no callback destination
        if [[ -z "$CALLBACK_URL$PIPELINE_ID" ]]; then
          echo "No Foreman callback destination; log collector disabled."
          exit 0
        fi

        mkdir -p "$FOREMAN_LOG_DIR"

        # ── Write the streamer daemon script ──────────────────────
        cat > "$FOREMAN_LOG_DIR/streamer.sh" << 'STREAMER_SCRIPT'
        #!/usr/bin/env bash
        set -euo pipefail

        LOG_DIR="$1"
        PIPE="$LOG_DIR/log.pipe"
        SEQ_FILE="$LOG_DIR/.seq"
        echo "0" > "$SEQ_FILE"

        send_chunk() {
          local content="$1"
          [[ -z "$content" ]] && return 0

          local seq
          seq="$(cat "$SEQ_FILE")"

          local payload
          payload="$(jq -nc \
            --arg job_name "$FOREMAN_JOB_NAME" \
            --arg step_name "output" \
            --argjson step_number 0 \
            --arg content "$content" \
            --argjson sequence "$seq" \
            '{
              job_name: $job_name,
              step_name: $step_name,
              step_number: $step_number,
              content: $content,
              sequence: $sequence
            }')"

          echo "$(( seq + 1 ))" > "$SEQ_FILE"

          if [[ -n "${FOREMAN_CALLBACK_URL:-}" && -n "${FOREMAN_CALLBACK_TOKEN:-}" ]]; then
            curl --silent --show-error --fail \
              --retry 1 --max-time 5 \
              --request POST \
              --header "Authorization: Bearer $FOREMAN_CALLBACK_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              "${FOREMAN_CALLBACK_URL%/}/job_logs" 2>/dev/null || true
          elif [[ -n "${FOREMAN_PIPELINE_ID:-}" && -n "${FOREMAN_API_TOKEN:-}" ]]; then
            curl --silent --show-error --fail \
              --retry 1 --max-time 5 \
              --request POST \
              --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              "${FOREMAN_BASE_URL%/}/api/pipelines/${FOREMAN_PIPELINE_ID}/admin-callback/job_logs" 2>/dev/null || true
          fi
        }

        # Create named pipe
        mkfifo "$PIPE" 2>/dev/null || true

        buffer=""
        flush_interval="${FOREMAN_FLUSH_INTERVAL:-5}"
        last_flush=$(date +%s)

        # Read from pipe, buffer, flush periodically
        while IFS= read -r -t "$flush_interval" line || true; do
          if [[ -n "$line" ]]; then
            buffer+="$line"$'\n'
          fi

          now=$(date +%s)
          elapsed=$(( now - last_flush ))

          # Flush if buffer is big enough or interval elapsed
          buf_len=${#buffer}
          if [[ $buf_len -gt 32768 ]] || [[ $elapsed -ge $flush_interval && $buf_len -gt 0 ]]; then
            send_chunk "$buffer"
            buffer=""
            last_flush=$now
          fi

          # Check if pipe is still open (writer closed = EOF)
          if [[ ! -p "$PIPE" ]]; then
            break
          fi
        done < "$PIPE"

        # Final flush
        if [[ -n "$buffer" ]]; then
          send_chunk "$buffer"
        fi
        STREAMER_SCRIPT
        chmod +x "$FOREMAN_LOG_DIR/streamer.sh"

        # ── Write env vars for the streamer ───────────────────────
        export FOREMAN_JOB_NAME="$JOB_NAME"
        export FOREMAN_CALLBACK_URL="$CALLBACK_URL"
        export FOREMAN_CALLBACK_TOKEN="$CALLBACK_TOKEN"
        export FOREMAN_PIPELINE_ID="$PIPELINE_ID"
        export FOREMAN_API_TOKEN="$FOREMAN_API_TOKEN"
        export FOREMAN_BASE_URL="$FOREMAN_BASE_URL"
        export FOREMAN_FLUSH_INTERVAL="$FLUSH_INTERVAL"

        # Save env for the daemon
        cat > "$FOREMAN_LOG_DIR/.env" << ENVEOF
        export FOREMAN_JOB_NAME="$JOB_NAME"
        export FOREMAN_CALLBACK_URL="$CALLBACK_URL"
        export FOREMAN_CALLBACK_TOKEN="$CALLBACK_TOKEN"
        export FOREMAN_PIPELINE_ID="$PIPELINE_ID"
        export FOREMAN_API_TOKEN="$FOREMAN_API_TOKEN"
        export FOREMAN_BASE_URL="$FOREMAN_BASE_URL"
        export FOREMAN_FLUSH_INTERVAL="$FLUSH_INTERVAL"
        ENVEOF

        # Create the named pipe
        PIPE="$FOREMAN_LOG_DIR/log.pipe"
        mkfifo "$PIPE"

        # Start the streamer daemon in background
        (
          source "$FOREMAN_LOG_DIR/.env"
          "$FOREMAN_LOG_DIR/streamer.sh" "$FOREMAN_LOG_DIR" &
        )
        STREAMER_PID=$!
        echo "$STREAMER_PID" > "$FOREMAN_LOG_DIR/.streamer_pid"

        # ── Set BASH_ENV to tee output to the pipe ────────────────
        cat > "$FOREMAN_LOG_DIR/hook.sh" << 'HOOKEOF'
        _FOREMAN_PIPE="${FOREMAN_LOG_DIR}/log.pipe"
        if [[ -p "$_FOREMAN_PIPE" ]]; then
          exec > >(tee -a "$_FOREMAN_PIPE") 2> >(tee -a "$_FOREMAN_PIPE" >&2)
        fi
        HOOKEOF

        # Export for subsequent steps
        {
          echo "FOREMAN_LOG_DIR=$FOREMAN_LOG_DIR"
          echo "BASH_ENV=$FOREMAN_LOG_DIR/hook.sh"
        } >> "$GITHUB_ENV"

        echo "Log streamer started (flush every ${FLUSH_INTERVAL}s)"
